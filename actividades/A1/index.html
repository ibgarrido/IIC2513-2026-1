<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://favicon.im/discord.com" type="image/png">
</head>
<body>
    <div class="background-container">
        <img src="assets/icon.svg" alt="Logo Discord" class="logo-esquina">
        

        <div class="login-container">
            <div class="form-container">
                <p class="hi">¡Hola de nuevo!</p>
                <p>¡Nos alegramos mucho de volver a verte!</p>
                
                <form>
                    <label for="usuario">Correo electrónico o número de teléfono <span class="required">*</span></label>
                    <input type="text" id="usuario" class="cell-input-user">
                    <br>
                    <label for="clave">Contraseña <span class="required">*</span></label>
                    <input type="password" id="clave" class="cell-input-pass">
                    <a href="https://discord.com/register">¿Has olvidado la contraseña?</a>
                    <br>
                    <button type="submit" class="submit-button">Iniciar sesión</button>
                </form>
                <div class="register-container">
                <p class="need-account">¿Necesitas una cuenta? <a href="https://discord.com/register">Regístrate</a></p>
                </div>
            </div>
            <div class="separator"></div>
             <div class="qr-container">
                <img src="assets/qr-login.png" alt="QR" class="qr-img">
                <h2 class="text-qr-sesion">Iniciar sesión con código QR</h2>
                <div class="info-container">
                    <p>Escanéalo con la aplicación de móvil de Discord para iniciar sesión de forma instantánea.</p>
                    <a href="">O Inicia sesión con una clave de acceso</a>
                </div>

             </div>
        </div>
       

        </div>
    </div>

</body>
</html>
